<!DOCTYPE html>
<html>
<head>
  <title>Test Input</title>
  <style>
    body { font-family: Arial; padding: 50px; }
    input { font-size: 16px; padding: 10px; width: 300px; }
    button { padding: 10px 20px; font-size: 16px; }
    #log { margin-top: 20px; padding: 10px; background: #f0f0f0; min-height: 100px; }
  </style>
</head>
<body>

<h1>Teste de Input</h1>

<input type="password" id="test" placeholder="Digite aqui" autofocus>
<button onclick="showValue()">Mostrar Valor</button>

<div id="log"></div>

<script>
const input = document.getElementById('test');

// Log de eventos
input.oninput = (e) => {
  document.getElementById('log').innerHTML += '<p>[input] Digitado: ' + e.target.value + '</p>';
};

input.onkeypress = (e) => {
  document.getElementById('log').innerHTML += '<p>[keypress] Tecla: ' + e.key + '</p>';
};

input.onchange = (e) => {
  document.getElementById('log').innerHTML += '<p>[change] Value: ' + e.target.value + '</p>';
};

function showValue() {
  alert('Valor: ' + input.value);
}

// Focus inicial
setTimeout(() => {
  input.focus();
  document.getElementById('log').innerHTML = '<p>[init] Input focado</p>';
}, 100);
</script>

</body>
</html>
