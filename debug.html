<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Debug Input</title>
</head>
<body>

<h1>Debug - Qual evento funciona?</h1>

<h2>Input 1: oninput</h2>
<input type="password" id="test1" placeholder="Digite aqui">
<p id="log1"></p>

<h2>Input 2: onkeydown</h2>
<input type="password" id="test2" placeholder="Digite aqui">
<p id="log2"></p>

<h2>Input 3: onkeyup</h2>
<input type="password" id="test3" placeholder="Digite aqui">
<p id="log3"></p>

<h2>Input 4: sem eventos (só value)</h2>
<input type="password" id="test4" placeholder="Digite aqui">
<button onclick="alert('test4: ' + document.getElementById('test4').value)">Ver valor</button>

<script>
document.getElementById('test1').oninput = (e) => {
  document.getElementById('log1').textContent = 'oninput: ' + e.target.value;
};

document.getElementById('test2').onkeydown = (e) => {
  document.getElementById('log2').textContent = 'onkeydown: ' + e.key;
};

document.getElementById('test3').onkeyup = (e) => {
  document.getElementById('log3').textContent = 'onkeyup: ' + e.target.value;
};
</script>

</body>
</html>
