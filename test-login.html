<!DOCTYPE html>
<html>
<head>
  <title>Teste de Login Automático</title>
  <script src="app.js"></script>
</head>
<body onload="testar()">
<div id="log"></div>

<script>
function testar() {
  const log = document.getElementById('log');

  // Simular clique de login
  setTimeout(() => {
    log.innerHTML += '<p>[1] Tentando fazer login com AndreTrader...</p>';
    document.getElementById('passwordInput').value = 'AndreTrader';
    submitPassword();

    setTimeout(() => {
      log.innerHTML += '<p>[2] Verificando se login funcionou...</p>';
      const loginScreen = document.getElementById('login-screen');
      const slideContainer = document.getElementById('slideContainer');

      if (loginScreen.style.display === 'none' && slideContainer.style.display === 'block') {
        log.innerHTML += '<p style="color: green;"><strong>✓ LOGIN SUCESSO!</strong></p>';
        log.innerHTML += '<p>A landing page carregou corretamente.</p>';
      } else {
        log.innerHTML += '<p style="color: red;"><strong>✗ Problema no login</strong></p>';
        log.innerHTML += '<p>Login screen display: ' + loginScreen.style.display + '</p>';
        log.innerHTML += '<p>Slide container display: ' + slideContainer.style.display + '</p>';
      }
    }, 1000);
  }, 500);
}
</script>

<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
p { margin: 10px 0; padding: 10px; background: white; border-radius: 4px; }
</style>
</body>
</html>
