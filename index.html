<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método Price Action</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="login-container" style="display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0;">
  <div class="login-box">
    <h1 class="login-title">Método Price Action</h1>
    <p class="login-subtitle">Oliver Velez | André Trader</p>
    <input type="password" id="pwd" class="login-input" placeholder="Digite: AndreTrader" autofocus>
    <button class="login-button" id="btnLogin" type="button">🔓 Entrar</button>
    <p id="err" class="login-error"></p>
  </div>
</div>

<header class="header" style="display: none;">
  <div class="header-container">
    <h1 class="logo-title">Método Price Action</h1>
    <button class="theme-toggle" id="themeToggle" type="button"><span class="theme-icon">🌙</span></button>
    <button class="logout-btn" id="btnLogout" type="button">🚪 Sair</button>
  </div>
</header>

<div class="main-layout" style="display: none;">
  <aside class="sidebar">
    <ul class="modules-list" id="modulesList"></ul>
  </aside>
  <main class="content-area">
    <article class="slide-container" id="slideContainer">
      <div class="slide-content" id="slideContent"></div>
    </article>
  </main>
</div>

<script>
console.log('Script iniciado');

const SENHA = 'AndreTrader';

document.getElementById('btnLogin').addEventListener('click', function() {
  console.log('Botão clicado');
  const pwd = document.getElementById('pwd').value;
  console.log('Senha digitada:', pwd);

  if (pwd === SENHA) {
    console.log('Senha correta!');
    sessionStorage.setItem('auth', 'true');
    document.getElementById('login-screen').style.display = 'none';
    loadApp();
  } else {
    console.log('Senha errada');
    document.getElementById('err').textContent = 'Senha incorreta';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});

document.getElementById('pwd').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    document.getElementById('btnLogin').click();
  }
});

async function loadApp() {
  console.log('Carregando app...');

  try {
    const res = await fetch('./apostila_scraped/landing-page-data.json');
    const data = await res.json();

    console.log('JSON carregado, módulos:', data.modules.length);

    document.querySelector('header').style.display = 'block';
    document.querySelector('.main-layout').style.display = 'flex';

    // Renderizar módulos
    const list = document.getElementById('modulesList');
    data.modules.forEach((m, i) => {
      const li = document.createElement('li');
      li.className = 'module-item';
      li.innerHTML = '<button onclick="selectModule(' + i + ')">' + m.title + '</button>';
      list.appendChild(li);
    });

    // Carregar primeiro slide
    selectModule(0);

  } catch(e) {
    console.error('Erro:', e);
    document.getElementById('slideContent').innerHTML = '<p style="color: red;">Erro: ' + e.message + '</p>';
  }
}

function selectModule(idx) {
  console.log('Selecionando módulo:', idx);
  const res = fetch('./apostila_scraped/landing-page-data.json');
  res.then(r => r.json()).then(data => {
    const mod = data.modules[idx];
    const topic = mod.topics[0];
    const slide = topic.slides[0];

    document.getElementById('slideContent').innerHTML =
      '<h2>' + slide.title + '</h2><div>' + slide.content + '</div>';
  });
}

// Verificar se já está autenticado
window.addEventListener('DOMContentLoaded', function() {
  console.log('DOM carregado');
  if (sessionStorage.getItem('auth') === 'true') {
    loadApp();
  }
});

console.log('Script pronto');
</script>

</body>
</html>
