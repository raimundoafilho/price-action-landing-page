<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método Price Action - Oliver Velez</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .topics-tree { list-style: none; padding: 0; }
    .topic-item { margin: 0; }
    .topic-header { padding: 12px; cursor: pointer; display: flex; align-items: center; background: #f5f5f5; border-bottom: 1px solid #ddd; user-select: none; }
    .topic-header:hover { background: #e8e8e8; }
    .topic-toggle { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-right: 8px; font-weight: bold; }
    .subtopics { list-style: none; padding-left: 20px; }
    .subtopic-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; }
    .subtopic-item:hover { background: #f9f9f9; }
    .subtopic-item.active { background: #e3f2fd; border-left: 3px solid #2196F3; }
    #content { padding: 20px; line-height: 1.6; }
  </style>
</head>
<body>

<div id="login-screen" class="login-container" style="display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;">
  <div class="login-box">
    <h1 class="login-title">Método Price Action</h1>
    <p class="login-subtitle">Oliver Velez | André Trader</p>
    <input type="password" id="pwd" class="login-input" placeholder="Digite a senha" autofocus>
    <button class="login-button" id="btnLogin" type="button">🔓 Entrar</button>
    <p id="err" class="login-error"></p>
  </div>
</div>

<div style="display: none; height: 100vh; display: flex; flex-direction: column;" id="app">
  <header class="header">
    <div class="header-container">
      <h1 class="logo-title">Método Price Action</h1>
      <div>
        <button id="themeToggle" type="button" class="theme-toggle"><span class="theme-icon">🌙</span></button>
        <button id="btnLogout" type="button" class="logout-btn">🚪 Sair</button>
      </div>
    </div>
  </header>

  <div style="display: flex; flex: 1; overflow: hidden;">
    <aside class="sidebar" style="width: 300px; overflow-y: auto; border-right: 1px solid #ddd;">
      <ul class="topics-tree" id="topicsList"></ul>
    </aside>

    <main style="flex: 1; overflow-y: auto;">
      <div id="content">
        <p>Selecione um tópico para começar</p>
      </div>
    </main>
  </div>
</div>

<script>
const SENHA = 'AndreTrader';
let data = null;

document.getElementById('btnLogin').onclick = login;
document.getElementById('pwd').onkeypress = e => e.key === 'Enter' && login();

function login() {
  if (document.getElementById('pwd').value === SENHA) {
    sessionStorage.auth = 1;
    showApp();
  } else {
    document.getElementById('err').textContent = 'Senha incorreta';
    document.getElementById('pwd').value = '';
  }
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  if (!data) {
    const url = './apostila_scraped/landing-page-data.json?t=' + Date.now();
    data = await fetch(url).then(r => r.json());
  }

  renderTopics();
}

function renderTopics() {
  const list = document.getElementById('topicsList');
  list.innerHTML = '';

  if (!data || !data.topics) return;

  data.topics.forEach((topic, idx) => {
    const li = document.createElement('li');
    li.className = 'topic-item';

    const header = document.createElement('div');
    header.className = 'topic-header';
    header.innerHTML = `<span class="topic-toggle">${topic.subtopics && topic.subtopics.length > 0 ? '+' : ''}</span><span>${topic.title}</span>`;

    header.onclick = () => {
      topic.expanded = !topic.expanded;
      const toggle = header.querySelector('.topic-toggle');
      toggle.textContent = topic.expanded ? '−' : '+';
      subtopicsList.style.display = topic.expanded ? 'block' : 'none';
    };

    li.appendChild(header);

    if (topic.subtopics && topic.subtopics.length > 0) {
      const subtopicsList = document.createElement('ul');
      subtopicsList.className = 'subtopics';
      subtopicsList.style.display = 'none';

      topic.subtopics.forEach((sub, sidx) => {
        const sli = document.createElement('li');
        sli.className = 'subtopic-item';
        sli.textContent = sub.title || `Subtópico ${sidx + 1}`;
        sli.onclick = () => {
          document.querySelectorAll('.subtopic-item').forEach(s => s.classList.remove('active'));
          sli.classList.add('active');
          document.getElementById('content').innerHTML = `<h2>${sub.title}</h2><div>${sub.content || 'Sem conteúdo'}</div>`;
        };
        subtopicsList.appendChild(sli);
      });

      li.appendChild(subtopicsList);
    }

    list.appendChild(li);
  });
}

document.getElementById('btnLogout').onclick = () => {
  if (confirm('Sair?')) {
    delete sessionStorage.auth;
    location.reload();
  }
};

document.getElementById('themeToggle').onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
};

window.addEventListener('DOMContentLoaded', () => {
  const pwd = document.getElementById('pwd');
  if (sessionStorage.auth) {
    showApp();
  } else {
    setTimeout(() => {
      pwd.focus();
      pwd.click();
    }, 50);
  }
});

// Forçar foco ao clicar na tela de login
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-screen').addEventListener('click', () => {
    document.getElementById('pwd').focus();
  });
});
</script>

</body>
</html>
