<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Método Price Action - Oliver Velez</title>
</head>
<body>

<input type="password" id="pwd" placeholder="Senha" autofocus>
<button id="btn">Entrar</button>
<p id="msg"></p>

<script>
const SENHA = 'AndreTrader';

document.getElementById('btn').onclick = () => {
  const pwd = document.getElementById('pwd').value;
  if (pwd === SENHA) {
    document.getElementById('msg').textContent = 'SUCESSO!';
  } else {
    document.getElementById('msg').textContent = 'Erro: ' + pwd;
  }
};
</script>

</body>
</html>
