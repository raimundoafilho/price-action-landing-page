<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método Price Action</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="login-container" style="display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;">
  <div class="login-box">
    <h1 class="login-title">Método Price Action</h1>
    <p class="login-subtitle">Oliver Velez | André Trader</p>
    <input type="password" id="pwd" class="login-input" placeholder="Digite: AndreTrader" autofocus>
    <button class="login-button" id="btnLogin" type="button">🔓 Entrar</button>
    <p id="err" class="login-error"></p>
  </div>
</div>

<header class="header" style="display: none;">
  <div class="header-container">
    <h1 class="logo-title">Método Price Action</h1>
    <button class="theme-toggle" id="themeToggle" type="button"><span class="theme-icon">🌙</span></button>
    <button class="logout-btn" id="btnLogout" type="button">🚪 Sair</button>
  </div>
</header>

<div class="main-layout" style="display: none;">
  <aside class="sidebar">
    <ul class="modules-list" id="modulesList"></ul>
  </aside>
  <main class="content-area">
    <article class="slide-container" id="slideContainer">
      <div class="slide-content" id="slideContent">
        <p>Selecione um módulo</p>
      </div>
    </article>
  </main>
</div>

<footer class="footer" style="display: none;">
  <button id="btnPrev" class="nav-button nav-button--prev">← Anterior</button>
  <span id="slideInfo">Slide 1</span>
  <button id="btnNext" class="nav-button nav-button--next">Próximo →</button>
</footer>

<script>
const SENHA = 'AndreTrader';
let data = null;
let modIdx = 0, topicIdx = 0, slideIdx = 0;

// LOGIN
console.log('[Init] Input pwd:', document.getElementById('pwd'));
console.log('[Init] Button login:', document.getElementById('btnLogin'));

document.getElementById('btnLogin').onclick = login;
document.getElementById('pwd').onkeypress = e => {
  console.log('[Key] Tecla:', e.key, 'Value:', document.getElementById('pwd').value);
  if (e.key === 'Enter') login();
};

// Também adicionar oninput para debug
document.getElementById('pwd').oninput = (e) => {
  console.log('[Input] Digitado:', e.target.value);
};

function login() {
  if (document.getElementById('pwd').value === SENHA) {
    sessionStorage.auth = 1;
    show();
  } else {
    document.getElementById('err').textContent = 'Errado';
    document.getElementById('pwd').value = '';
  }
}

async function show() {
  document.getElementById('login-screen').style.display = 'none';
  document.querySelector('header').style.display = 'block';
  document.querySelector('.main-layout').style.display = 'flex';
  document.querySelector('footer').style.display = 'block';

  if (!data) {
    data = await fetch('./apostila_scraped/landing-page-data.json').then(r => r.json());
  }

  renderMods();
  renderSlide();
}

function renderMods() {
  const list = document.getElementById('modulesList');
  list.innerHTML = '';

  data.modules.forEach((m, i) => {
    const li = document.createElement('li');
    li.className = 'module-item' + (i === modIdx ? ' active' : '');

    const btn = document.createElement('button');
    btn.textContent = m.title;
    btn.onclick = () => {
      modIdx = i;
      topicIdx = 0;
      slideIdx = 0;
      renderMods();
      renderSlide();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });
}

function renderSlide() {
  if (!data || !data.modules) return;

  const mod = data.modules[modIdx];
  if (!mod || !mod.topics || !mod.topics[topicIdx]) return;

  const topic = mod.topics[topicIdx];
  if (!topic || !topic.slides || !topic.slides[slideIdx]) return;

  const slide = topic.slides[slideIdx];

  document.getElementById('slideContent').innerHTML =
    '<h2>' + slide.title + '</h2><div class="slide-body">' + slide.content + '</div>';

  document.getElementById('slideInfo').textContent =
    mod.title + ' - ' + slide.title;

  document.getElementById('btnPrev').disabled = modIdx === 0 && slideIdx === 0;
  document.getElementById('btnNext').disabled =
    modIdx === data.modules.length - 1 && slideIdx === topic.slides.length - 1;
}

document.getElementById('btnNext').onclick = () => {
  const topic = data.modules[modIdx].topics[topicIdx];
  if (slideIdx < topic.slides.length - 1) {
    slideIdx++;
  } else if (modIdx < data.modules.length - 1) {
    modIdx++;
    topicIdx = 0;
    slideIdx = 0;
    renderMods();
  }
  renderSlide();
};

document.getElementById('btnPrev').onclick = () => {
  if (slideIdx > 0) {
    slideIdx--;
  } else if (modIdx > 0) {
    modIdx--;
    const topic = data.modules[modIdx].topics[0];
    slideIdx = topic.slides.length - 1;
    renderMods();
  }
  renderSlide();
};

document.getElementById('btnLogout').onclick = () => {
  if (confirm('Sair?')) {
    delete sessionStorage.auth;
    location.reload();
  }
};

document.getElementById('themeToggle').onclick = () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
};

window.addEventListener('DOMContentLoaded', () => {
  const pwd = document.getElementById('pwd');
  if (sessionStorage.auth) {
    show();
  } else {
    setTimeout(() => {
      pwd.focus();
      pwd.click();
    }, 100);
  }
});

// Forçar foco no input ao clicar em qualquer lugar da tela de login
document.getElementById('login-screen').addEventListener('click', (e) => {
  const pwd = document.getElementById('pwd');
  if (e.target !== pwd) {
    pwd.focus();
  }
});
</script>

</body>
</html>
