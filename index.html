<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método Price Action</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="login-container" style="display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;">
  <div class="login-box">
    <h1 class="login-title">Método Price Action</h1>
    <p class="login-subtitle">Oliver Velez | André Trader</p>
    <input type="password" id="pwd" class="login-input" placeholder="Digite: AndreTrader" autofocus>
    <button class="login-button" id="btnLogin" type="button">🔓 Entrar</button>
    <p id="err" class="login-error"></p>
  </div>
</div>

<header class="header" style="display: none;">
  <div class="header-container">
    <h1 class="logo-title">Método Price Action</h1>
    <button class="theme-toggle" id="themeToggle" type="button"><span class="theme-icon">🌙</span></button>
    <button class="logout-btn" id="btnLogout" type="button">🚪 Sair</button>
  </div>
</header>

<div class="main-layout" style="display: none;">
  <aside class="sidebar">
    <ul class="modules-list" id="modulesList"></ul>
  </aside>
  <main class="content-area">
    <article class="slide-container" id="slideContainer">
      <div class="slide-content" id="slideContent">
        <p>Selecione um módulo para começar</p>
      </div>
    </article>
  </main>
</div>

<footer class="footer" style="display: none;">
  <nav class="footer-nav">
    <button id="btnPrev" type="button" class="nav-button nav-button--prev">← Anterior</button>
    <span id="slideInfo">Slide 1</span>
    <button id="btnNext" type="button" class="nav-button nav-button--next">Próximo →</button>
  </nav>
</footer>

<script>
console.log('=== SCRIPT INICIADO ===');

const SENHA = 'AndreTrader';
let appData = null;
let currentModuleIdx = 0;
let currentTopicIdx = 0;
let currentSlideIdx = 0;

// LOGIN
document.getElementById('btnLogin').addEventListener('click', doLogin);
document.getElementById('pwd').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const pwd = document.getElementById('pwd').value;
  console.log('Login tentado com:', pwd);

  if (pwd === SENHA) {
    console.log('✓ Senha correta!');
    sessionStorage.setItem('auth', 'true');
    document.getElementById('login-screen').style.display = 'none';
    loadApp();
  } else {
    console.log('✗ Senha errada');
    document.getElementById('err').textContent = 'Senha incorreta';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

async function loadApp() {
  console.log('Carregando aplicação...');

  try {
    const res = await fetch('./apostila_scraped/landing-page-data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);

    appData = await res.json();
    console.log('✓ JSON carregado');
    if (appData.modules) console.log('  Módulos:', appData.modules.length);
    if (appData.modules && appData.modules[0] && appData.modules[0].topics)
      console.log('  Módulo 0 tópicos:', appData.modules[0].topics.length);

    // Mostrar UI
    document.querySelector('header').style.display = 'block';
    document.querySelector('.main-layout').style.display = 'flex';
    document.querySelector('footer').style.display = 'block';

    // Renderizar módulos
    renderModules();

    // Carregar primeiro slide
    renderSlide();

    // Event listeners
    document.getElementById('btnNext').addEventListener('click', goNext);
    document.getElementById('btnPrev').addEventListener('click', goPrev);
    document.getElementById('btnLogout').addEventListener('click', logout);
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

  } catch(e) {
    console.error('✗ Erro:', e);
    document.querySelector('.main-layout').style.display = 'flex';
    document.getElementById('slideContent').innerHTML = '<p style="color: red; font-size: 18px;">Erro: ' + e.message + '</p>';
  }
}

function renderModules() {
  console.log('Renderizando módulos...');
  const list = document.getElementById('modulesList');
  list.innerHTML = '';

  appData.modules.forEach((m, i) => {
    const li = document.createElement('li');
    li.className = 'module-item' + (i === currentModuleIdx ? ' active' : '');

    const btn = document.createElement('button');
    btn.textContent = m.title;
    btn.onclick = function() {
      console.log('Clicado módulo:', i, m.title);
      currentModuleIdx = i;
      currentTopicIdx = 0;
      currentSlideIdx = 0;
      renderModules();
      renderSlide();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });

  console.log('✓ Módulos renderizados:', appData.modules.length);
}

function renderSlide() {
  console.log('Renderizando slide...');
  console.log('  Módulo:', currentModuleIdx, 'Tópico:', currentTopicIdx, 'Slide:', currentSlideIdx);

  if (!appData) {
    console.error('appData não carregado');
    return;
  }

  if (!appData.modules || currentModuleIdx >= appData.modules.length) {
    console.error('Módulo inválido, idx:', currentModuleIdx);
    return;
  }

  const mod = appData.modules[currentModuleIdx];
  console.log('  Módulo:', mod.title);
  console.log('  Módulo tem topics?', mod.topics !== undefined);
  console.log('  Topics length:', mod.topics ? mod.topics.length : 'N/A');

  if (!mod.topics || mod.topics.length === 0) {
    console.error('Módulo sem tópicos');
    document.getElementById('slideContent').innerHTML = '<p>Módulo sem conteúdo</p>';
    return;
  }

  if (currentTopicIdx >= mod.topics.length) {
    currentTopicIdx = 0;
  }

  const topic = mod.topics[currentTopicIdx];
  console.log('  Tópico:', topic.title);
  console.log('  Tópico tem slides?', topic.slides !== undefined);
  console.log('  Slides length:', topic.slides ? topic.slides.length : 'N/A');

  if (!topic.slides || topic.slides.length === 0) {
    console.error('Tópico sem slides');
    document.getElementById('slideContent').innerHTML = '<p>Tópico sem slides</p>';
    return;
  }

  if (currentSlideIdx >= topic.slides.length) {
    currentSlideIdx = 0;
  }

  const slide = topic.slides[currentSlideIdx];
  console.log('  Slide:', slide.title);

  // Renderizar conteúdo
  const content = document.getElementById('slideContent');
  content.innerHTML = `
    <h2>${slide.title}</h2>
    <div class="slide-body">${slide.content || '(sem conteúdo)'}</div>
  `;

  // Atualizar info
  const totalSlides = topic.slides.length;
  document.getElementById('slideInfo').textContent =
    `${mod.title} - ${slide.title} (${currentSlideIdx + 1}/${totalSlides})`;

  // Desabilitar botões
  document.getElementById('btnPrev').disabled = (currentSlideIdx === 0 && currentModuleIdx === 0);
  document.getElementById('btnNext').disabled =
    (currentSlideIdx === totalSlides - 1 && currentModuleIdx === appData.modules.length - 1);

  console.log('✓ Slide renderizado');
}

function goNext() {
  console.log('Próximo...');
  if (!appData || !appData.modules) return;

  const mod = appData.modules[currentModuleIdx];
  if (!mod || !mod.topics || !mod.topics[currentTopicIdx]) return;

  const topic = mod.topics[currentTopicIdx];
  if (!topic || !topic.slides) return;

  const totalSlides = topic.slides.length;

  if (currentSlideIdx < totalSlides - 1) {
    currentSlideIdx++;
  } else if (currentModuleIdx < appData.modules.length - 1) {
    currentModuleIdx++;
    currentTopicIdx = 0;
    currentSlideIdx = 0;
    renderModules();
  }

  renderSlide();
}

function goPrev() {
  console.log('Anterior...');
  if (!appData || !appData.modules) return;

  if (currentSlideIdx > 0) {
    currentSlideIdx--;
  } else if (currentModuleIdx > 0) {
    currentModuleIdx--;
    const mod = appData.modules[currentModuleIdx];
    if (!mod || !mod.topics || !mod.topics[0]) return;

    const topic = mod.topics[0];
    if (!topic || !topic.slides) return;

    currentSlideIdx = topic.slides.length - 1;
    renderModules();
  }

  renderSlide();
}

function logout() {
  if (confirm('Sair?')) {
    sessionStorage.removeItem('auth');
    location.reload();
  }
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

// Verificar autenticação ao carregar
window.addEventListener('DOMContentLoaded', function() {
  console.log('DOM carregado');
  if (sessionStorage.getItem('auth') === 'true') {
    console.log('Usuário já autenticado, carregando app...');
    document.getElementById('login-screen').style.display = 'none';
    loadApp();
  } else {
    console.log('Usuário não autenticado, mostrando login');
    document.getElementById('pwd').focus();
  }
});

console.log('=== SCRIPT PRONTO ===');
</script>

</body>
</html>
