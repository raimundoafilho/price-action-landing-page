<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método Price Action - Oliver Velez</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }

    #login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 90%; max-width: 400px; }
    .login-box h1 { font-size: 28px; margin-bottom: 10px; color: #333; }
    .login-box p { font-size: 14px; color: #666; margin: 5px 0; }

    #pwd { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 4px; font-size: 16px; box-shadow: none !important; outline: none !important; -webkit-appearance: none; -moz-appearance: none; appearance: none; background: white; color: black; }
    #pwd:focus { border: 2px solid #667eea; outline: none; }
    #btnLogin { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    #btnLogin:hover { background: #5568d3; }
    #err { color: red; margin-top: 10px; font-size: 14px; }

    #app { display: none; height: 100vh; flex-direction: column; }
    .header { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 280px; background: #f9f9f9; border-right: 1px solid #ddd; overflow-y: auto; }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
  </style>
  <link rel="stylesheet" href="style.css">
  <style>
    .topic { border-bottom: 1px solid #ddd; }
    .topic-header { padding: 12px; cursor: pointer; font-weight: 500; background: #fff; }
    .topic-header:hover { background: #f0f0f0; }
    .subtopic-list { list-style: none; padding: 0; margin: 0; display: none; }
    .subtopic-item { padding: 10px 20px; cursor: pointer; border-bottom: 1px solid #eee; }
    .subtopic-item:hover { background: #f0f0f0; }
    .subtopic-item.active { background: #e3f2fd; border-left: 3px solid #2196F3; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Método Price Action</h1>
    <p>Oliver Velez | André Trader</p>
    <input type="password" id="pwd" placeholder="Senha">
    <button id="btnLogin">Entrar</button>
    <p id="err"></p>
  </div>
</div>

<div id="app">
  <div class="header">
    <h1>Método Price Action</h1>
    <button id="btnLogout">Sair</button>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div id="topics-container"></div>
    </div>
    <div class="content" id="content">
      <p>Selecione um tópico</p>
    </div>
  </div>
</div>

<script>
const SENHA = 'AndreTrader';
let data = null;

document.getElementById('btnLogin').onclick = () => login();
document.getElementById('pwd').onkeypress = (e) => e.key === 'Enter' && login();

function login() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === SENHA) {
    sessionStorage.auth = 1;
    showApp();
  } else {
    document.getElementById('err').textContent = 'Incorreto';
    document.getElementById('pwd').value = '';
  }
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  if (!data) {
    const url = './apostila_scraped/landing-page-data.json?t=' + Date.now();
    data = await fetch(url).then(r => r.json());
  }

  renderTopics();
}

function renderTopics() {
  const container = document.getElementById('topics-container');
  container.innerHTML = '';

  if (!data || !data.topics) return;

  data.topics.forEach((topic, idx) => {
    const topicDiv = document.createElement('div');
    topicDiv.className = 'topic';

    const header = document.createElement('div');
    header.className = 'topic-header';
    header.textContent = '+ ' + topic.title;
    header.onclick = () => {
      const list = topicDiv.querySelector('.subtopic-list');
      if (list.style.display === 'none') {
        list.style.display = 'block';
        header.textContent = '− ' + topic.title;
      } else {
        list.style.display = 'none';
        header.textContent = '+ ' + topic.title;
      }
    };

    topicDiv.appendChild(header);

    const list = document.createElement('ul');
    list.className = 'subtopic-list';

    (topic.subtopics || []).forEach(sub => {
      const li = document.createElement('li');
      li.className = 'subtopic-item';
      li.textContent = sub.title;
      li.onclick = () => {
        document.querySelectorAll('.subtopic-item').forEach(s => s.classList.remove('active'));
        li.classList.add('active');
        document.getElementById('content').innerHTML = '<h2>' + sub.title + '</h2><p>' + (sub.content || 'Sem conteúdo') + '</p>';
      };
      list.appendChild(li);
    });

    topicDiv.appendChild(list);
    container.appendChild(topicDiv);
  });
}

document.getElementById('btnLogout').onclick = () => {
  delete sessionStorage.auth;
  location.reload();
};

window.onload = () => {
  if (sessionStorage.auth) showApp();
  setTimeout(() => document.getElementById('pwd').focus(), 100);
};
</script>

</body>
</html>
